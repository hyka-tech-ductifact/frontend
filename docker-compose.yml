# Development compose — three modes:
#   make dev          → dev server with hot-reload via Docker (:4300)
#   make docker-start → production build served by Nginx (:4200)
#   make docker-stop  → stop everything

services:
  dev:
    image: node:22-alpine
    container_name: ductifact_dev_server
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npx ng serve --host 0.0.0.0 --poll 500"
    ports:
      - '4300:4200'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  frontend:
    build: .
    image: frontend-app
    container_name: ductifact_dev_frontend
    restart: unless-stopped
    ports:
      - '4200:8080'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ductifact

networks:
  ductifact:
    external: true
    name: ductifact
