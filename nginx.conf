server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ─────────────────────────────────────────
    # Angular handles routing client-side. Any path that doesn't
    # match a real file must fall back to index.html so the Angular
    # router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching ─────────────────────────────────────────────
    # Hashed assets (main.abc123.js) are immutable — cache aggressively.
    # index.html must never be cached (it references the hashed filenames).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
}
