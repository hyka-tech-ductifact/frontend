<div class="flex h-screen overflow-hidden bg-[#f0f9ff] text-slate-800 font-sans">
  <!-- Sidebar -->
  @if (showNav()) {
    <aside
      [class]="isSidebarCollapsed() ? 'w-20' : 'w-80'"
      class="bg-white shadow-xl flex flex-col transition-all duration-300 relative flex-shrink-0"
    >
      <!-- Toggle Button -->
      <button
        (click)="toggleSidebar()"
        class="absolute -right-4 top-8 w-8 h-8 bg-white shadow-lg rounded-full flex items-center justify-center text-sky-600 hover:bg-sky-50 transition-all z-50 border border-slate-100 active:scale-95"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="w-4 h-4 transition-transform duration-300"
          [class.rotate-180]="isSidebarCollapsed()"
        >
          <path
            fill-rule="evenodd"
            d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
            clip-rule="evenodd"
          />
        </svg>
      </button>

      <!-- Sidebar Header -->
      <div
        class="p-6 pb-8"
        style="background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 50%, #38bdf8 100%)"
      >
        <div class="flex items-center gap-4 mb-6">
          <div
            class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg flex-shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="w-8 h-8 text-sky-600"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
              />
            </svg>
          </div>
          @if (!isSidebarCollapsed()) {
            <div class="flex flex-col overflow-hidden">
              <h3 class="text-white font-bold text-lg truncate">Carlos Rodríguez</h3>
              <p class="text-sky-100 text-sm opacity-90 truncate">
                carlos.rodriguez&#64;ductifact.es
              </p>
              <span
                class="text-xs font-medium bg-white/20 px-2 py-1 rounded-full w-max backdrop-blur-sm mt-1 text-sky-50"
                >Administrador</span
              >
            </div>
          }
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav class="flex-1 py-6 overflow-y-auto">
        <div class="space-y-2 px-4">
          <!-- Dashboard -->
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-sky-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-sky-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-sky-200 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-sky-600"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.28m5.94 2.28l-2.28 5.941"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span class="font-semibold text-slate-700 group-hover:text-sky-700 whitespace-nowrap"
                >Dashboard</span
              >
            }
          </button>

          <!-- Clients (active) -->
          <button
            [class]="isClientsActive() ? 'bg-sky-50' : 'hover:bg-sky-50'"
            class="w-full px-4 py-3 flex items-center gap-3 rounded-xl text-left group active:scale-95 transition-colors"
          >
            <div
              [class]="isClientsActive() ? 'bg-sky-200' : 'bg-sky-100'"
              class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                [class]="isClientsActive() ? 'text-sky-700' : 'text-sky-600'"
                class="w-5 h-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span
                [class]="
                  isClientsActive() ? 'text-sky-700 font-bold' : 'text-slate-700 font-semibold'
                "
                class="whitespace-nowrap"
                >Mis Clientes</span
              >
            }
          </button>

          <!-- Edit Profile -->
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-sky-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-sky-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-sky-200 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-sky-600"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span class="font-semibold text-slate-700 group-hover:text-sky-700 whitespace-nowrap"
                >Editar Perfil</span
              >
            }
          </button>

          <!-- Premium -->
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-sky-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-500 rounded-xl flex items-center justify-center text-white flex-shrink-0 shadow-md"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="currentColor"
                class="w-5 h-5"
              >
                <path
                  fill-rule="evenodd"
                  d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"
                  clip-rule="evenodd"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <div class="flex flex-col">
                <span
                  class="font-semibold text-slate-700 group-hover:text-sky-700 whitespace-nowrap"
                  >Hazte Premium</span
                >
                <span class="text-xs text-slate-500 whitespace-nowrap"
                  >Desbloquea todas las funciones</span
                >
              </div>
            }
          </button>

          <!-- Settings -->
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-sky-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-sky-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-sky-200 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-sky-600"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span class="font-semibold text-slate-700 group-hover:text-sky-700 whitespace-nowrap"
                >Ajustes</span
              >
            }
          </button>

          <!-- Support -->
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-sky-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-sky-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-sky-200 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-sky-600"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span class="font-semibold text-slate-700 group-hover:text-sky-700 whitespace-nowrap"
                >Soporte</span
              >
            }
          </button>
        </div>

        <!-- Divider -->
        <div class="my-6 mx-8 border-t border-slate-100"></div>

        <!-- Logout -->
        <div class="px-4">
          <button
            class="w-full px-4 py-3 flex items-center gap-3 hover:bg-red-50 rounded-xl transition-colors text-left group active:scale-95"
          >
            <div
              class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center flex-shrink-0 group-hover:bg-red-200 transition-colors"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="w-5 h-5 text-red-500"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
                />
              </svg>
            </div>
            @if (!isSidebarCollapsed()) {
              <span class="font-semibold text-red-500 whitespace-nowrap">Cerrar Sesión</span>
            }
          </button>
        </div>
      </nav>
    </aside>
  }

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <router-outlet />
  </main>
</div>
