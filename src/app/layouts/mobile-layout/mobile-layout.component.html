@if (showMenu()) {
  <ion-menu contentId="mobile-main-content" menuId="main-menu" side="start">
    <ion-header class="ion-no-border">
      <ion-toolbar class="menu-toolbar">
        <!-- Menu Header with gradient -->
        <div class="menu-header">
          <div class="flex items-start justify-between mb-6">
            <h2 class="text-white text-xl font-bold">Perfil</h2>
            <ion-menu-toggle>
              <button
                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors text-white active:scale-95"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2"
                  stroke="currentColor"
                  class="w-5 h-5"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </ion-menu-toggle>
          </div>
          <!-- User Profile -->
          <div class="flex items-center gap-3">
            <div
              class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg flex-shrink-0"
            >
              <ion-icon name="person-circle-outline" class="text-sky-600 text-4xl"></ion-icon>
            </div>
            <div class="flex flex-col">
              <h3 class="text-white font-bold text-base">Carlos Rodríguez</h3>
              <p class="text-sky-100 text-xs opacity-90">carlos.rodriguez&#64;ductifact.es</p>
              <span
                class="text-xs font-medium bg-white/20 px-2 py-0.5 rounded-full w-max backdrop-blur-sm mt-1 text-sky-50"
                >Administrador</span
              >
            </div>
          </div>
        </div>
      </ion-toolbar>
    </ion-header>

    <ion-content class="menu-content">
      <ion-list lines="none" class="ion-no-padding pt-4">
        <!-- Mis Clientes -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-sky-100 group-hover:bg-sky-200">
              <ion-icon name="people-outline" class="text-sky-600 text-xl"></ion-icon>
            </div>
            <ion-label class="menu-label">Mis Clientes</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <!-- Editar Perfil -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-sky-100">
              <ion-icon name="create-outline" class="text-sky-600 text-xl"></ion-icon>
            </div>
            <ion-label class="menu-label">Editar Perfil</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <!-- Premium -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-gradient-to-br from-amber-400 to-amber-500">
              <ion-icon name="star-outline" class="text-white text-xl"></ion-icon>
            </div>
            <ion-label>
              <p class="font-semibold text-slate-700">Hazte Premium</p>
              <p class="text-xs text-slate-500">Desbloquea todas las funciones</p>
            </ion-label>
          </ion-item>
        </ion-menu-toggle>

        <!-- Ajustes -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-sky-100">
              <ion-icon name="settings-outline" class="text-sky-600 text-xl"></ion-icon>
            </div>
            <ion-label class="menu-label">Ajustes</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <!-- Soporte -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-sky-100">
              <ion-icon name="headset-outline" class="text-sky-600 text-xl"></ion-icon>
            </div>
            <ion-label class="menu-label">Soporte</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <div class="my-4 mx-6 border-t border-slate-100"></div>

        <!-- Cerrar Sesión -->
        <ion-menu-toggle>
          <ion-item button class="menu-item" detail="false">
            <div slot="start" class="menu-icon-wrap bg-red-100">
              <ion-icon name="log-out-outline" class="text-red-500 text-xl"></ion-icon>
            </div>
            <ion-label class="font-semibold text-red-500">Cerrar Sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>
}

<!-- Main Content -->
<div id="mobile-main-content">
  <router-outlet />
</div>
