@if (deviceService.isMobile()) {
  <app-login-mobile
    [isLoading]="isLoading()"
    [error]="errorMessage()"
    (loginSubmit)="onLogin($event)"
    (signupSubmit)="onSignup($event)"
  />
} @else {
  <app-login-web
    [isLoading]="isLoading()"
    [error]="errorMessage()"
    (loginSubmit)="onLogin($event)"
    (signupSubmit)="onSignup($event)"
  />
}
